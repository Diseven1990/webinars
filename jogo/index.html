<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#101219">
  <title>Level Up: Relançamento - Unity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app" id="app">
    <section class="screen start-screen" id="startScreen">
      <div class="brand-kicker">jogo da memória</div>
      <h1>Level Up:<br><span>Relançamento - Unity</span></h1>
      <p class="subtitle">Módulos</p>
      <form class="player-form" id="playerForm" autocomplete="off">
        <label>
          <span>Nome</span>
          <input id="playerName" name="playerName" type="text" maxlength="28" placeholder="O teu nome" required>
        </label>
        <label>
          <span>Centro</span>
          <select id="playerCenter" name="playerCenter" required>
            <option value="">Escolhe o centro</option>
            <option>Lisboa</option>
            <option>Porto</option>
            <option>Coimbra</option>
            <option>Faro</option>
            <option>Braga</option>
            <option>Televendas</option>
          </select>
        </label>
        <div class="form-error" id="formError" aria-live="polite"></div>
      </form>
      <button class="ghost-btn" id="viewRankingBtn" type="button">🏆 Ver Ranking</button>
      <button class="primary-btn" id="startBtn" type="button">Começar</button>
    </section>

    <section class="screen game-screen hidden" id="gameScreen">
      <header class="topbar">
        <div>
          <div class="label">Tempo</div>
          <div class="value" id="timer">02:00</div>
        </div>
        <div class="center-status">
          <div class="label">Progresso</div>
          <div class="value" id="progressText">0/7</div>
        </div>
        <div>
          <div class="label">Erros</div>
          <div class="value" id="errorsText">0</div>
        </div>
      </header>

      <div class="instruction" id="instruction">Memoriza a posição dos módulos</div>
      <div class="countdown" id="countdown">8</div>

      <section class="selected-strip" id="selectedStrip" aria-label="Módulos selecionados"></section>
      <section class="cards-grid" id="cardsGrid" aria-label="Cartas dos módulos"></section>
    </section>

    <section class="screen result-screen hidden" id="resultScreen">
      <div class="brand-kicker">módulos concluídos</div>
      <h2>Estrutura concluída</h2>
      <div class="result-card">
        <div><span>Tempo usado</span><strong id="finalTime">00:00</strong></div>
        <div><span>Erros</span><strong id="finalErrors">0</strong></div>
        <div><span>Pontuação</span><strong id="finalScore">1000</strong></div>
      </div>
      <button class="primary-btn" id="restartBtn" type="button">Jogar novamente</button>
      <button class="ghost-btn" id="continueBtn" type="button">Continuar</button>
    </section>
  </main>

  <script src="script.js"></script>
<div id="countdownOverlay" class="countdown-overlay hidden"><div id="countdownBig" class="countdown-big">8</div><div class="countdown-text">Memoriza a estrutura</div></div>
</body>
</html>
