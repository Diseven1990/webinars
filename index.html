<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise de UGC</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="ugc-body">

<div class="ugc-wrapper">

<div class="hero-card">
    <span class="badge">Webinar | UGC</span>
    <h1>Análise de Conteúdo UGC</h1>
    <p>Assista ao vídeo e identifique os principais problemas presentes no conteúdo.</p>
</div>

<div class="ugc-card">

<div class="video-card">
<video controls width="100%">
<source src="video/diana.MOV" type="video/MOV">
</video>
</div>

<div class="form-grid">
<input id="nome" placeholder="Nome">
<input id="curso" placeholder="Curso">
</div>

<textarea id="resposta" placeholder="Descreve os problemas identificados neste conteúdo UGC..."></textarea>

<button onclick="analisar()" class="analyse-btn">Analisar Resposta</button>

<div id="resultado"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
</body>
</html>
